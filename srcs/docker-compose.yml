networks:
  inception_net:
    driver: bridge
secrets:
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_password:
    file: ../secrets/wp_password.txt
services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    image: nginx
    depends_on:
      - wordpress
    networks:
      - inception_net
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/wordpress
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    image: mariadb
    environment:
      - SQL_USER=${SQL_USER}
      - SQL_DATABASE=${SQL_DATABASE}
    secrets:
      - db_password
      - db_root_password
    networks:
      - inception_net
    volumes:
      - db_data:/var/lib/mysql
  wordpress:
    container_name: wordpress
    depends_on:
      - mariadb
    build: ./requirements/wordpress
    image: wordpress
    environment:
      - SQL_DATABASE=${SQL_DATABASE}
      - SQL_USER=${SQL_USER}
      - SQL_HOST=mariadb
      - WP_USER=${WP_USER}
    secrets:
      - db_password
      - wp_admin_password
      - wp_password
    networks:
      - inception_net
    volumes:
      - wp_data:/var/www/wordpress
volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/aldiaz-u/data/db
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/aldiaz-u/data/wordpress
